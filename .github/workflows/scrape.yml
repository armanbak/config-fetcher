name: Scrape V2Ray configs

on:
  schedule:
    - cron: "0 */0.1 * * *"   # every 3 hours
  workflow_dispatch: {}      # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated configs
        run: |
          git config user.name "config-bot"
          git config user.email "config-bot@users.noreply.github.com"
          git add configs/
          git diff --quiet --cached || git commit -m "chore: refresh configs [skip ci]"
          git push
